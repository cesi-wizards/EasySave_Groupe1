name: Release

on:
  push:
    branches:
      - main

jobs:
  # ── Linux & Windows ──────────────────────────────────────────────────────────
  build-linux-windows:
    name: Build Linux & Windows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' Directory.Build.props || echo "1.0.0")
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── CLI ────────────────────────────────────────────────────────────────
      - name: Publish CLI — Windows x64
        run: |
          dotnet publish src/EasySave.CLI/EasySave.CLI.csproj \
            -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/cli-win-x64
          mv dist/cli-win-x64/EasySave.exe dist/EasySave-win-x64.exe

      - name: Publish CLI — Windows x86
        run: |
          dotnet publish src/EasySave.CLI/EasySave.CLI.csproj \
            -c Release -r win-x86 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/cli-win-x86
          mv dist/cli-win-x86/EasySave.exe dist/EasySave-win-x86.exe

      - name: Publish CLI — Windows ARM64
        run: |
          dotnet publish src/EasySave.CLI/EasySave.CLI.csproj \
            -c Release -r win-arm64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/cli-win-arm64
          mv dist/cli-win-arm64/EasySave.exe dist/EasySave-win-arm64.exe

      - name: Publish CLI — Linux x64
        run: |
          dotnet publish src/EasySave.CLI/EasySave.CLI.csproj \
            -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/cli-linux-x64
          tar -czf dist/EasySave-linux-x64.tar.gz -C dist/cli-linux-x64 .

      - name: Publish CLI — Linux ARM64
        run: |
          dotnet publish src/EasySave.CLI/EasySave.CLI.csproj \
            -c Release -r linux-arm64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/cli-linux-arm64
          tar -czf dist/EasySave-linux-arm64.tar.gz -C dist/cli-linux-arm64 .

      # ── GUI ────────────────────────────────────────────────────────────────
      - name: Publish GUI — Windows x64
        run: |
          dotnet publish src/EasySave.GUI/EasySave.GUI.csproj \
            -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/gui-win-x64
          zip -j dist/EasySave-GUI-win-x64.zip dist/gui-win-x64/EasySave.GUI.exe

      - name: Publish GUI — Windows ARM64
        run: |
          dotnet publish src/EasySave.GUI/EasySave.GUI.csproj \
            -c Release -r win-arm64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/gui-win-arm64
          zip -j dist/EasySave-GUI-win-arm64.zip dist/gui-win-arm64/EasySave.GUI.exe

      - name: Publish GUI — Linux x64
        run: |
          dotnet publish src/EasySave.GUI/EasySave.GUI.csproj \
            -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/gui-linux-x64
          tar -czf dist/EasySave-GUI-linux-x64.tar.gz -C dist/gui-linux-x64 EasySave.GUI

      - name: Publish GUI — Linux ARM64
        run: |
          dotnet publish src/EasySave.GUI/EasySave.GUI.csproj \
            -c Release -r linux-arm64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/gui-linux-arm64
          tar -czf dist/EasySave-GUI-linux-arm64.tar.gz -C dist/gui-linux-arm64 EasySave.GUI

      # ── EasyLog DLL + NuGet ────────────────────────────────────────────────
      - name: Publish DLL — Portable
        run: |
          dotnet build src/EasyLog/EasyLog.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.value }} \
            -o dist/dll
          zip -j dist/EasyLog-dll.zip dist/dll/EasyLog.dll

      - name: Pack EasyLog
        run: |
          dotnet pack src/EasyLog/EasyLog.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.value }} \
            -o dist/nuget

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux-windows
          path: dist/

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(sed -n 's/.*<Version>\(.*\)<\/Version>.*/\1/p' Directory.Build.props | tr -d ' \t')
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish CLI — macOS x64
        run: |
          dotnet publish src/EasySave.CLI/EasySave.CLI.csproj \
            -c Release -r osx-x64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/cli-osx-x64
          tar -czf dist/EasySave-osx-x64.tar.gz -C dist/cli-osx-x64 .

      - name: Publish CLI — macOS ARM64
        run: |
          dotnet publish src/EasySave.CLI/EasySave.CLI.csproj \
            -c Release -r osx-arm64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/cli-osx-arm64
          tar -czf dist/EasySave-osx-arm64.tar.gz -C dist/cli-osx-arm64 .

      - name: Publish GUI — macOS x64 (.app bundle)
        run: |
          dotnet publish src/EasySave.GUI/EasySave.GUI.csproj \
            -c Release -r osx-x64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/gui-osx-x64
          mkdir -p dist/EasySave-osx-x64.app/Contents/MacOS
          mkdir -p dist/EasySave-osx-x64.app/Contents/Resources
          cp dist/gui-osx-x64/EasySave.GUI dist/EasySave-osx-x64.app/Contents/MacOS/EasySave
          cp src/EasySave.GUI/Assets/EasySave-logo.icns dist/EasySave-osx-x64.app/Contents/Resources/AppIcon.icns
          sed 's/2\.0\.0/${{ steps.version.outputs.value }}/g' \
            src/EasySave.GUI/Info.plist > dist/EasySave-osx-x64.app/Contents/Info.plist
          chmod +x dist/EasySave-osx-x64.app/Contents/MacOS/EasySave
          codesign --force --deep --sign - dist/EasySave-osx-x64.app
          tar -czf dist/EasySave-GUI-osx-x64.tar.gz -C dist EasySave-osx-x64.app

      - name: Publish GUI — macOS ARM64 (.app bundle)
        run: |
          dotnet publish src/EasySave.GUI/EasySave.GUI.csproj \
            -c Release -r osx-arm64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/gui-osx-arm64
          mkdir -p dist/EasySave-osx-arm64.app/Contents/MacOS
          mkdir -p dist/EasySave-osx-arm64.app/Contents/Resources
          cp dist/gui-osx-arm64/EasySave.GUI dist/EasySave-osx-arm64.app/Contents/MacOS/EasySave
          cp src/EasySave.GUI/Assets/EasySave-logo.icns dist/EasySave-osx-arm64.app/Contents/Resources/AppIcon.icns
          sed 's/2\.0\.0/${{ steps.version.outputs.value }}/g' \
            src/EasySave.GUI/Info.plist > dist/EasySave-osx-arm64.app/Contents/Info.plist
          chmod +x dist/EasySave-osx-arm64.app/Contents/MacOS/EasySave
          codesign --force --deep --sign - dist/EasySave-osx-arm64.app
          tar -czf dist/EasySave-GUI-osx-arm64.tar.gz -C dist EasySave-osx-arm64.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-macos
          path: dist/

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-linux-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' Directory.Build.props || echo "1.0.0")
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Linux & Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-linux-windows
          path: dist/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-macos
          path: dist/

      - name: Push to GitHub Packages
        run: |
          dotnet nuget add source \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push dist/nuget/*.nupkg \
            --source github \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            dist/EasySave-win-x64.exe
            dist/EasySave-win-x86.exe
            dist/EasySave-win-arm64.exe
            dist/EasySave-linux-x64.tar.gz
            dist/EasySave-linux-arm64.tar.gz
            dist/EasySave-osx-x64.tar.gz
            dist/EasySave-osx-arm64.tar.gz
            dist/EasySave-GUI-win-x64.zip
            dist/EasySave-GUI-win-arm64.zip
            dist/EasySave-GUI-linux-x64.tar.gz
            dist/EasySave-GUI-linux-arm64.tar.gz
            dist/EasySave-GUI-osx-x64.tar.gz
            dist/EasySave-GUI-osx-arm64.tar.gz
            dist/EasyLog-dll.zip
            dist/nuget/*.nupkg
