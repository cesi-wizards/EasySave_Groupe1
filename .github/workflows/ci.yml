name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # créer la GitHub Release
      packages: write   # publier sur GitHub Packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Version ──────────────────────────────────────────────────────────────
      - name: Extract version from Directory.Build.props
        id: version
        run: |
          VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' Directory.Build.props || echo "1.0.0")
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      # ── .NET ─────────────────────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── Build CLI pour chaque plateforme ─────────────────────────────────────
      - name: Publish — Windows x64
        run: |
          dotnet publish src/EasySave.CLI/EasySave.CLI.csproj \
            -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/win-x64
          mv dist/win-x64/EasySave.exe dist/EasySave-win-x64.exe

      - name: Publish — Windows x86
        run: |
          dotnet publish src/EasySave.CLI/EasySave.CLI.csproj \
            -c Release -r win-x86 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/win-x86
          mv dist/win-x86/EasySave.exe dist/EasySave-win-x86.exe

      - name: Publish — Windows ARM64
        run: |
          dotnet publish src/EasySave.CLI/EasySave.CLI.csproj \
            -c Release -r win-arm64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/win-arm64
          mv dist/win-arm64/EasySave.exe dist/EasySave-win-arm64.exe

      - name: Publish — Linux x64
        run: |
          dotnet publish src/EasySave.CLI/EasySave.CLI.csproj \
            -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/linux-x64
          tar -czf dist/EasySave-linux-x64.tar.gz -C dist/linux-x64 .

      - name: Publish — Linux ARM64
        run: |
          dotnet publish src/EasySave.CLI/EasySave.CLI.csproj \
            -c Release -r linux-arm64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/linux-arm64
          tar -czf dist/EasySave-linux-arm64.tar.gz -C dist/linux-arm64 .

      - name: Publish — macOS x64
        run: |
          dotnet publish src/EasySave.CLI/EasySave.CLI.csproj \
            -c Release -r osx-x64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/osx-x64
          tar -czf dist/EasySave-osx-x64.tar.gz -C dist/osx-x64 .

      - name: Publish — macOS ARM64
        run: |
          dotnet publish src/EasySave.CLI/EasySave.CLI.csproj \
            -c Release -r osx-arm64 --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} \
            -o dist/osx-arm64
          tar -czf dist/EasySave-osx-arm64.tar.gz -C dist/osx-arm64 .

      - name: Publish DLL — Portable
        run: |
          dotnet build src/EasyLog/EasyLog.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.value }} \
            -o dist/dll
          zip -j dist/EasyLog-dll.zip dist/dll/EasyLog.dll

      # ── NuGet — GitHub Packages ───────────────────────────────────────────────
      - name: Pack EasyLog
        run: |
          dotnet pack src/EasyLog/EasyLog.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.value }} \
            -o dist/nuget

      - name: Push to GitHub Packages
        run: |
          dotnet nuget add source \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push dist/nuget/*.nupkg \
            --source github \
            --skip-duplicate

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            dist/EasySave-win-x64.exe
            dist/EasySave-win-x86.exe
            dist/EasySave-win-arm64.exe
            dist/EasySave-linux-x64.tar.gz
            dist/EasySave-linux-arm64.tar.gz
            dist/EasySave-osx-x64.tar.gz
            dist/EasySave-osx-arm64.tar.gz
            dist/EasyLog-dll.zip
            dist/nuget/*.nupkg
